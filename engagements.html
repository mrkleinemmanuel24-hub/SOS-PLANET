  var tabsEl = document.getElementById('tabs');
  var container = document.getElementById('eng-container');
  var currentDomain = DOMAINS[0].id;

  // Build tabs
  DOMAINS.forEach(function(d) {
    var tab = document.createElement('div');
    tab.className = 'tab' + (d.id === currentDomain ? ' active' : '');
    tab.textContent = d.name;
    tab.dataset.domain = d.id;
    var countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = '(' + d.engagements.length + ')';
    tab.appendChild(countSpan);
    tab.addEventListener('click', function() { switchDomain(d.id); });
    tabsEl.appendChild(tab);
  });

  // Build engagement sections
  DOMAINS.forEach(function(d) {
    var section = document.createElement('div');
    section.className = 'eng-section' + (d.id === currentDomain ? ' active' : '');
    section.id = 'section-' + d.id;
    d.engagements.forEach(function(eng) {
      var item = document.createElement('div');
      item.className = 'eng-item';
      var isChecked = PlanetEngine.isEngaged(eng.id);
      if (isChecked) item.classList.add('checked');
      var impactText = '';
      if (eng.co2 > 0) impactText += '-' + eng.co2 + ' kg CO2/an';
      if (eng.water > 0) impactText += (impactText ? ' | ' : '') + '-' + (eng.water >= 1000 ? (eng.water/1000) + ' 000' : eng.water) + ' L eau/an';
      item.innerHTML = '<input type="checkbox" ' + (isChecked ? 'checked' : '') + ' data-id="' + eng.id + '" data-co2="' + eng.co2 + '" data-water="' + (eng.water||0) + '" data-domain="' + d.id + '">'
        + '<div class="eng-content">'
        + '<div class="eng-title">' + eng.title + '</div>'
        + '<div class="eng-meta">'
        + '<span class="eng-diff ' + eng.diff + '" title="' + eng.diff + '"></span>'
        + (impactText ? '<span class="eng-impact">' + impactText + '</span>' : '')
        + '<span class="eng-source">' + eng.source + '</span>'
        + '</div></div>';
      var cb = item.querySelector('input');
      cb.addEventListener('change', function() {
        var impact = { co2: eng.co2, water: eng.water || 0, domain: d.id };
        PlanetEngine.setEngagement(eng.id, this.checked, impact);
        item.classList.toggle('checked', this.checked);
        updateScoreBanner();
      });
      section.appendChild(item);
    });
    container.appendChild(section);
  });

  function switchDomain(domainId) {
    currentDomain = domainId;
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.domain === domainId);
    });
    document.querySelectorAll('.eng-section').forEach(function(s) {
      s.classList.toggle('active', s.id === 'section-' + domainId);
    });
  }

  function updateScoreBanner() {
    var c = PlanetEngine.getPersonalCounters();
    document.getElementById('score-text').textContent =
      c.engagements + ' engagement' + (c.engagements > 1 ? 's' : '') + ' = ' + PlanetEngine.formatCO2(c.co2);
    document.getElementById('score-detail').textContent =
      (c.water > 0 ? PlanetEngine.formatNumber(c.water) + ' L eau economises | ' : '') +
      c.trees + ' arbres equivalent';
    document.getElementById('score-level').textContent = 'Niveau : ' + c.level.name;

    // Badges
    var badgeRow = document.getElementById('badge-row');
    badgeRow.innerHTML = '';
    PlanetEngine.BADGE_DEFS.forEach(function(b) {
      var earned = c.badges.indexOf(b.id) !== -1;
      var pill = document.createElement('span');
      pill.className = 'badge-pill ' + (earned ? 'earned' : 'locked');
      pill.textContent = b.name;
      badgeRow.appendChild(pill);
    });
  }

  updateScoreBanner();
})();
