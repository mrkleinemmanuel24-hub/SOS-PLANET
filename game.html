<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E1A;--card:rgba(255,255,255,0.06);--card-b:rgba(255,255,255,0.1);
  --green:#10B981;--gold:#FBBF24;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;
  --pink:#EC4899;--text:#E8E4DC;--dim:#6B7280;--xp-bar:#059669;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Stars background */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 50% 10%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 70% 40%,rgba(255,255,255,.2),transparent),radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,.4),transparent),radial-gradient(1.5px 1.5px at 15% 55%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 85% 15%,rgba(255,255,255,.3),transparent),radial-gradient(1.5px 1.5px at 45% 85%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 65% 60%,rgba(255,255,255,.2),transparent),radial-gradient(1px 1px at 25% 35%,rgba(255,255,255,.35),transparent);pointer-events:none;z-index:0}

.app{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:0 0 100px}

/* Top bar */
.topbar{display:flex;align-items:center;padding:14px 16px;gap:10px}
.topbar a{font-size:.8rem;font-weight:600;color:var(--green)}
.topbar h1{flex:1;text-align:center;font-size:.95rem;font-weight:800;letter-spacing:-.02em}
.streak-badge{display:flex;align-items:center;gap:4px;font-size:.8rem;font-weight:800;color:var(--gold);background:rgba(251,191,36,.12);padding:4px 10px;border-radius:14px}
.streak-badge.dead{color:var(--dim);background:rgba(255,255,255,.05)}

/* XP Bar */
.xp-section{padding:0 16px;margin-bottom:16px}
.xp-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.xp-level{font-size:.7rem;font-weight:800;color:var(--gold);background:rgba(251,191,36,.15);padding:3px 10px;border-radius:10px;white-space:nowrap}
.xp-bar-wrap{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:8px;overflow:hidden;position:relative}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:8px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.xp-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,rgba(255,255,255,.3));border-radius:8px}
.xp-text{font-size:.65rem;color:var(--dim);text-align:right}

/* Planet zone */
.planet-zone{text-align:center;padding:10px 0 20px;position:relative}
.planet-wrap{width:220px;height:220px;margin:0 auto;position:relative}
.planet-canvas{width:220px;height:220px;border-radius:50%;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(16,185,129,.2),0 0 120px rgba(16,185,129,.05);transition:box-shadow .5s}
.planet-canvas.glow{box-shadow:0 0 80px rgba(251,191,36,.4),0 0 160px rgba(16,185,129,.15)}
.planet-surface{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;transition:background 1s}
.planet-name{font-size:.85rem;font-weight:700;margin-top:10px;color:var(--dim)}
.planet-creatures{position:absolute;inset:0;pointer-events:none}
.creature{position:absolute;font-size:1.6rem;animation:creature-float 3s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
@keyframes creature-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Tabs */
.game-tabs{display:flex;gap:4px;padding:0 16px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.game-tabs::-webkit-scrollbar{display:none}
.gtab{padding:8px 16px;border-radius:20px;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--card-b);background:var(--card);color:var(--dim);transition:all .2s;user-select:none}
.gtab.active{background:var(--green);color:#fff;border-color:var(--green)}
.gtab .notif{display:inline-block;width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:4px;vertical-align:middle}

/* Panels */
.panel{display:none;padding:0 16px}
.panel.active{display:block}

/* Daily Quests */
.quest-card{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center;transition:all .3s;position:relative;overflow:hidden}
.quest-card.done{opacity:.5;border-color:var(--green)}
.quest-card.done::after{content:'✓';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:1.4rem;color:var(--green);font-weight:900}
.quest-emoji{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:12px;flex-shrink:0}
.quest-info{flex:1;min-width:0}
.quest-title{font-size:.85rem;font-weight:700;line-height:1.3;margin-bottom:3px}
.quest-reward{font-size:.7rem;color:var(--gold);font-weight:700}
.quest-btn{padding:8px 18px;border:none;border-radius:20px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0}
.quest-btn.do{background:var(--green);color:#fff}
.quest-btn.do:hover{background:#059669;transform:scale(1.05)}
.quest-btn.done-btn{background:rgba(255,255,255,.05);color:var(--dim);cursor:default}

/* Boss */
.boss-card{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(236,72,153,.1));border:1px solid rgba(139,92,246,.25);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px}
.boss-emoji{font-size:3.5rem;display:block;margin-bottom:10px;animation:boss-pulse 2s ease-in-out infinite}
@keyframes boss-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.boss-title{font-size:1.1rem;font-weight:900;color:var(--purple);margin-bottom:4px}
.boss-desc{font-size:.8rem;color:var(--dim);margin-bottom:14px;line-height:1.4}
.boss-progress{height:14px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-bottom:8px;position:relative}
.boss-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:10px;transition:width .5s}
.boss-count{font-size:.7rem;color:var(--dim)}
.boss-reward{margin-top:12px;padding:8px 16px;background:rgba(251,191,36,.1);border-radius:10px;display:inline-block;font-size:.75rem;font-weight:700;color:var(--gold)}
.boss-contrib-btn{margin-top:12px;padding:10px 24px;border:none;border-radius:20px;background:var(--purple);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;display:block;width:100%}

/* Collection */
.collect-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.collect-item{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:12px 6px;text-align:center;transition:all .3s}
.collect-item.unlocked{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}
.collect-item.locked{opacity:.3;filter:grayscale(1)}
.collect-emoji{font-size:2rem;display:block;margin-bottom:4px}
.collect-name{font-size:.6rem;font-weight:700;color:var(--dim)}
.collect-item.unlocked .collect-name{color:var(--text)}
.collect-req{font-size:.55rem;color:var(--gold);margin-top:2px}

/* Leaderboard */
.lb-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--card-b);border-radius:12px;margin-bottom:8px}
.lb-item.me{border-color:var(--green);background:rgba(16,185,129,.08)}
.lb-rank{font-size:1.2rem;font-weight:900;width:30px;text-align:center;flex-shrink:0}
.lb-rank.gold{color:var(--gold)}
.lb-rank.silver{color:#C0C0C0}
.lb-rank.bronze{color:#CD7F32}
.lb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:.8rem;font-weight:700}
.lb-xp{font-size:.7rem;color:var(--dim)}
.lb-level{font-size:.65rem;color:var(--gold);font-weight:700;padding:2px 8px;background:rgba(251,191,36,.1);border-radius:8px}

/* Achievement popup */
.achieve-popup{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(16,185,129,.15));border:1px solid rgba(251,191,36,.4);backdrop-filter:blur(20px);padding:14px 24px;border-radius:16px;z-index:9999;text-align:center;transition:transform .5s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:320px}
.achieve-popup.show{transform:translateX(-50%) translateY(0)}
.achieve-popup .ach-emoji{font-size:2rem;display:block}
.achieve-popup .ach-text{font-size:.85rem;font-weight:700;color:var(--gold);margin-top:4px}
.achieve-popup .ach-sub{font-size:.7rem;color:var(--dim)}

/* Level up overlay */
.lvlup{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
.lvlup.show{opacity:1;pointer-events:auto}
.lvlup-box{text-align:center;animation:lvlup-pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes lvlup-pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.lvlup-emoji{font-size:5rem;display:block;margin-bottom:12px}
.lvlup-title{font-size:1.6rem;font-weight:900;color:var(--gold)}
.lvlup-sub{font-size:.9rem;color:var(--dim);margin:8px 0 20px}
.lvlup-btn{padding:14px 40px;border:none;border-radius:30px;background:var(--green);color:#fff;font-size:1rem;font-weight:700;cursor:pointer}

/* Confetti */
.confetti{position:fixed;top:-10px;width:8px;height:8px;z-index:10001;border-radius:2px;pointer-events:none;animation:conf-fall 1.8s ease-out forwards}
@keyframes conf-fall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,.95);backdrop-filter:blur(12px);border-top:1px solid var(--card-b);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav a{flex:1;text-align:center;padding:8px 4px 6px;font-size:.6rem;font-weight:600;color:var(--dim);text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s}
.bottom-nav a.active{color:var(--green)}
.bottom-nav a span{font-size:1.2rem}

/* Invite */
.invite-section{text-align:center;padding:20px;margin-top:12px}
.invite-btn{padding:12px 28px;border:2px solid var(--green);background:transparent;color:var(--green);border-radius:24px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.invite-btn:hover{background:var(--green);color:#fff}

/* Footer */
.game-footer{text-align:center;padding:30px 16px;font-size:.6rem;color:var(--dim);line-height:1.6}
</style>
</head>

  {name:'Lucas',avatar:'👦',xp:1420},
  {name:'Jade',avatar:'👧',xp:1180},
  {name:'Noah',avatar:'🧒',xp:980},
  {name:'Emma',avatar:'👩‍🦳',xp:750},
  {name:'Enzo',avatar:'👨‍🦲',xp:520},
  {name:'Chloe',avatar:'👱‍♀️',xp:310}
];

// ===== STATE =====
var state = JSON.parse(localStorage.getItem('sos-planet-game') || 'null') || {
  xp: 0,
  streak: 0,
  lastPlay: null,
  todayQuests: [],
  todayDone: [],
  bossProgress: 0,
  bossIndex: 0,
  achievements: [],
  totalQuests: 0
};

function save() { localStorage.setItem('sos-planet-game', JSON.stringify(state)); }

// ===== AUDIO =====
var audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type) {
  initAudio();
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  if (type === 'xp') {
    osc.type = 'sine'; osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(784, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } else if (type === 'levelup') {
    osc.type = 'sine';
    [523, 659, 784, 1047].forEach(function(f, i) {
      var t = audioCtx.currentTime + i * 0.12;
      osc.frequency.setValueAtTime(f, t);
    });
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
    osc.start(); osc.stop(audioCtx.currentTime + 0.6);
  } else if (type === 'boss') {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.15);
    osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  }
}

// ===== LEVEL CALC =====
function getLevel() {
  for (var i = LEVELS.length - 1; i >= 0; i--) {
    if (state.xp >= LEVELS[i].xp) return {idx: i, data: LEVELS[i]};
  }
  return {idx: 0, data: LEVELS[0]};
}

function getXpProgress() {
  var lv = getLevel();
  var next = LEVELS[lv.idx + 1];
  if (!next) return {pct: 100, current: state.xp, needed: state.xp};
  var base = lv.data.xp;
  var needed = next.xp - base;
  var current = state.xp - base;
  return {pct: Math.min(100, Math.round(current / needed * 100)), current: current, needed: needed};
}

// ===== STREAK =====
function checkStreak() {
  var today = new Date().toISOString().slice(0, 10);
  var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (state.lastPlay === today) return;
  if (state.lastPlay === yesterday) {
    // streak continues, will increment when quest done
  } else if (state.lastPlay && state.lastPlay !== today) {
    state.streak = 0; // streak broken
  }
}

function updateStreakDisplay() {
  var el = document.getElementById('streak');
  var num = document.getElementById('streak-num');
  var icon = document.getElementById('streak-icon');
  num.textContent = state.streak;
  if (state.streak >= 7) { icon.textContent = '🔥'; el.className = 'streak-badge'; }
  else if (state.streak >= 3) { icon.textContent = '🔥'; el.className = 'streak-badge'; }
  else if (state.streak > 0) { icon.textContent = '🔥'; el.className = 'streak-badge'; }
  else { icon.textContent = '💤'; el.className = 'streak-badge dead'; }
}

// ===== DAILY QUESTS =====
function getDailyQuests() {
  var today = new Date().toISOString().slice(0, 10);
  if (state.todayQuests.length === 3 && state.lastPlay && state.lastPlay.slice(0,10) === today) {
    return state.todayQuests;
  }
  // New day: pick 3 random quests
  var pool = QUEST_POOL.slice();
  var picked = [];
  for (var i = 0; i < 3; i++) {
    var r = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(r, 1)[0]);
  }
  state.todayQuests = picked;
  state.todayDone = [];
  save();
  return picked;
}

// ===== GAIN XP =====
function gainXP(amount) {
  var oldLevel = getLevel().idx;
  state.xp += amount;
  save();
  var newLevel = getLevel().idx;
  updateUI();
  playSound('xp');
  if (newLevel > oldLevel) {
    setTimeout(function() { showLevelUp(LEVELS[newLevel]); }, 400);
  }
  // Check achievements
  checkAchievements();
}

// ===== QUEST COMPLETION =====
function completeQuest(idx) {
  if (state.todayDone.indexOf(idx) !== -1) return;
  state.todayDone.push(idx);
  var today = new Date().toISOString().slice(0, 10);
  if (state.lastPlay !== today) {
    if (state.lastPlay === new Date(Date.now() - 86400000).toISOString().slice(0, 10)) {
      state.streak++;
    } else {
      state.streak = 1;
    }
    state.lastPlay = today;
  }
  state.totalQuests++;
  save();
  var quest = state.todayQuests[idx];
  gainXP(quest.xp);
  showAchievement(quest.emoji, '+' + quest.xp + ' XP', quest.title);
  renderQuests();

  // All 3 done today?
  if (state.todayDone.length === 3) {
    setTimeout(function() {
      gainXP(50); // bonus
      showAchievement('⭐', 'COMBO +50 XP', '3 quetes terminees !');
    }, 1500);
  }
}

// ===== BOSS =====
function contributeBoss() {
  state.bossProgress += 1 + Math.floor(Math.random() * 5);
  var boss = BOSSES[state.bossIndex % BOSSES.length];
  if (state.bossProgress >= boss.goal) {
    state.bossProgress = 0;
    state.bossIndex++;
    save();
    gainXP(boss.xp);
    playSound('boss');
    showAchievement('🏆', 'BOSS VAINCU !', boss.reward);
  } else {
    save();
    playSound('xp');
  }
  renderBoss();
}

// ===== ACHIEVEMENTS =====
function checkAchievements() {
  var checks = [
    {id:'first',cond:state.totalQuests>=1,emoji:'🎯',text:'Premier pas'},
    {id:'streak3',cond:state.streak>=3,emoji:'🔥',text:'3 jours de suite'},
    {id:'streak7',cond:state.streak>=7,emoji:'💪',text:'1 semaine !'},
    {id:'quests10',cond:state.totalQuests>=10,emoji:'⚡',text:'10 quetes'},
    {id:'quests50',cond:state.totalQuests>=50,emoji:'🌟',text:'50 quetes'},
    {id:'lvl5',cond:getLevel().idx>=4,emoji:'🏅',text:'Niveau Riviere'},
    {id:'lvl10',cond:getLevel().idx>=10,emoji:'👑',text:'Galaxie !'}
  ];
  checks.forEach(function(a) {
    if (a.cond && state.achievements.indexOf(a.id) === -1) {
      state.achievements.push(a.id);
      save();
      setTimeout(function() {
        showAchievement(a.emoji, 'SUCCES DEBLOQUE', a.text);
      }, 2000);
    }
  });
}

// ===== UI UPDATES =====
function showAchievement(emoji, text, sub) {
  var el = document.getElementById('achieve-popup');
  document.getElementById('ach-emoji').textContent = emoji;
  document.getElementById('ach-text').textContent = text;
  document.getElementById('ach-sub').textContent = sub || '';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function showLevelUp(level) {
  playSound('levelup');
  spawnConfetti();
  document.getElementById('lvlup-emoji').textContent = level.emoji;
  document.getElementById('lvlup-title').textContent = 'Niveau ' + level.name + ' !';
  document.getElementById('lvlup-sub').textContent = 'Ta planete evolue : ' + level.desc;
  document.getElementById('lvlup').classList.add('show');
}

window.closeLevelUp = function() {
  document.getElementById('lvlup').classList.remove('show');
};

function spawnConfetti() {
  var colors = ['#10B981','#FBBF24','#EF4444','#3B82F6','#8B5CF6','#EC4899'];
  for (var i = 0; i < 40; i++) {
    var c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.width = (6 + Math.random() * 6) + 'px';
    c.style.height = (6 + Math.random() * 6) + 'px';
    document.body.appendChild(c);
    setTimeout(function(el) { el.remove(); }.bind(null, c), 2500);
  }
}

function updateUI() {
  var lv = getLevel();
  var prog = getXpProgress();

  // Level badge
  document.getElementById('level-badge').textContent = 'Niv. ' + (lv.idx + 1) + ' — ' + lv.data.emoji + ' ' + lv.data.name;

  // XP bar
  document.getElementById('xp-bar').style.width = prog.pct + '%';
  document.getElementById('xp-text').textContent = prog.current + ' / ' + prog.needed + ' XP';

  // Planet
  var surface = document.getElementById('planet-surface');
  surface.style.background = buildPlanetGradient(lv.idx);
  document.getElementById('planet-name').textContent = 'Ta planete : ' + lv.data.desc;
  if (state.xp > 0) document.getElementById('planet').classList.add('glow');

  // Creatures on planet
  renderPlanetCreatures(lv.idx);

  // Streak
  updateStreakDisplay();

  // Leaderboard update
  LEADERBOARD[0].xp = state.xp;
}

function buildPlanetGradient(lvlIdx) {
  var gradients = [
    'radial-gradient(circle at 35% 35%, #8B8B8B, #4B4B4B, #2A2A2A)',
    'radial-gradient(circle at 35% 35%, #6B8B5E, #4B6043, #2A3B22)',
    'radial-gradient(circle at 35% 35%, #4D9B4D, #2D7028, #1A4D1A)',
    'radial-gradient(circle at 35% 35%, #3D8B3D, #1A6B1A, #0D4D0D)',
    'radial-gradient(circle at 35% 35%, #2D8B5E, #1A6B4D, #0D4D3D, #1565A0 80%)',
    'radial-gradient(circle at 35% 35%, #2D6B8B, #1A4D6B, #0C3547, #1565C0 80%)',
    'radial-gradient(circle at 35% 35%, #4D8B3D, #2D6B1A, #1A4D0D, #D4A017 70%)',
    'radial-gradient(circle at 35% 35%, #0D7B3D, #0B5E2A, #083D1A, #2D8B2D 80%)',
    'radial-gradient(circle at 35% 35%, #1B8B50, #107340, #0B5E2A, #8B6914 70%, #3B82F6 90%)',
    'radial-gradient(circle at 35% 35%, #15915D, #107A4E, #0B6B3D, #2563EB 60%, #D4A017 85%)',
    'radial-gradient(circle at 35% 35%, #10B981, #0D9B6B, #0B7B50, #3B82F6 50%, #FBBF24 75%, #8B5CF6 95%)'
  ];
  return gradients[Math.min(lvlIdx, gradients.length - 1)];
}

function renderPlanetCreatures(lvlIdx) {
  var container = document.getElementById('planet-creatures');
  container.innerHTML = '';
  var unlocked = CREATURES.filter(function(c) { return (lvlIdx + 1) >= c.lvl; });
  // Show max 6 on planet
  var showing = unlocked.slice(-6);
  var positions = [
    {top:'20%',left:'25%'},{top:'30%',left:'65%'},{top:'55%',left:'20%'},
    {top:'60%',left:'70%'},{top:'40%',left:'45%'},{top:'75%',left:'40%'}
  ];
  showing.forEach(function(c, i) {
    var el = document.createElement('span');
    el.className = 'creature';
    el.textContent = c.emoji;
    el.style.top = positions[i].top;
    el.style.left = positions[i].left;
    el.style.animationDelay = (i * 0.4) + 's';
    container.appendChild(el);
  });
}

// ===== RENDER PANELS =====

function renderQuests() {
  var quests = getDailyQuests();
  var html = '<div style="padding:0 0 8px;font-size:.75rem;color:var(--dim);font-weight:600;margin-bottom:4px">QUETES DU JOUR (' + state.todayDone.length + '/3)</div>';
  quests.forEach(function(q, i) {
    var done = state.todayDone.indexOf(i) !== -1;
    html += '<div class="quest-card' + (done ? ' done' : '') + '">' +
      '<div class="quest-emoji">' + q.emoji + '</div>' +
      '<div class="quest-info"><div class="quest-title">' + q.title + '</div>' +
      '<div class="quest-reward">+' + q.xp + ' XP</div></div>' +
      (done ? '<button class="quest-btn done-btn">Fait !</button>' :
        '<button class="quest-btn do" onclick="completeQuest(' + i + ')">Go !</button>') +
    '</div>';
  });
  // Bonus streak
  if (state.streak >= 3) {
    html += '<div style="text-align:center;padding:10px;font-size:.75rem;color:var(--gold);font-weight:700">🔥 Streak x' + state.streak + ' — Les XP sont plus savoureux !</div>';
  }
  document.getElementById('panel-quests').innerHTML = html;
}

function renderBoss() {
  var boss = BOSSES[state.bossIndex % BOSSES.length];
  var pct = Math.min(100, Math.round(state.bossProgress / boss.goal * 100));
  document.getElementById('panel-boss').innerHTML =
    '<div class="boss-card">' +
      '<span class="boss-emoji">' + boss.emoji + '</span>' +
      '<div class="boss-title">' + boss.title + '</div>' +
      '<div class="boss-desc">' + boss.desc + '</div>' +
      '<div class="boss-progress"><div class="boss-bar" style="width:' + pct + '%"></div></div>' +
      '<div class="boss-count">' + state.bossProgress + ' / ' + boss.goal + ' — ' + pct + '%</div>' +
      '<div class="boss-reward">Recompense : ' + boss.reward + '</div>' +
      '<button class="boss-contrib-btn" onclick="contributeBoss()">Contribuer (+1 a +5)</button>' +
    '</div>' +
    '<div style="font-size:.7rem;color:var(--dim);text-align:center;padding:8px">Defi collectif : chaque joueur contribue. Tous ensemble !</div>';
}

function renderCollection() {
  var lvl = getLevel().idx + 1;
  var html = '<div style="padding:0 0 10px;font-size:.75rem;color:var(--dim);font-weight:600">' + CREATURES.filter(function(c){return lvl>=c.lvl}).length + '/' + CREATURES.length + ' CREATURES DEBLOQUEES</div>';
  html += '<div class="collect-grid">';
  CREATURES.forEach(function(c) {
    var unlocked = lvl >= c.lvl;
    html += '<div class="collect-item ' + (unlocked ? 'unlocked' : 'locked') + '">' +
      '<span class="collect-emoji">' + (unlocked ? c.emoji : '❓') + '</span>' +
      '<div class="collect-name">' + (unlocked ? c.name : '???') + '</div>' +
      '<div class="collect-req">Niv. ' + c.lvl + '</div>' +
    '</div>';
  });
  html += '</div>';
  document.getElementById('panel-collection').innerHTML = html;
}

function renderLeaderboard() {
  LEADERBOARD[0].xp = state.xp;
  var sorted = LEADERBOARD.slice().sort(function(a, b) { return b.xp - a.xp; });
  var html = '<div style="padding:0 0 10px;font-size:.75rem;color:var(--dim);font-weight:600">CLASSEMENT HEBDO</div>';
  sorted.forEach(function(p, i) {
    var rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    var rankText = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    var pLvl = getLevelForXP(p.xp);
    html += '<div class="lb-item' + (p.me ? ' me' : '') + '">' +
      '<div class="lb-rank ' + rankClass + '">' + rankText + '</div>' +
      '<div class="lb-avatar" style="background:rgba(255,255,255,.08)">' + p.avatar + '</div>' +
      '<div class="lb-info"><div class="lb-name">' + p.name + (p.me ? ' (toi)' : '') + '</div>' +
      '<div class="lb-xp">' + p.xp.toLocaleString() + ' XP</div></div>' +
      '<div class="lb-level">' + pLvl.emoji + ' ' + pLvl.name + '</div>' +
    '</div>';
  });
  html += '<div class="invite-section"><button class="invite-btn" onclick="shareInvite()">Invite tes amis a jouer</button></div>';
  html += '<div class="game-footer">&copy; 2026 Emmanuel Klein — SOS Planet<br>Aucune donnee personnelle collectee. Tout est stocke sur ton telephone.</div>';
  document.getElementById('panel-leaderboard').innerHTML = html;
}

function getLevelForXP(xp) {
  for (var i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].xp) return LEVELS[i];
  }
  return LEVELS[0];
}

window.shareInvite = function() {
  var text = 'Rejoins-moi sur SOS Planet ! Je suis niveau ' + (getLevel().idx + 1) + ' (' + getLevel().data.name + '). On sauve la planete en jouant.';
  if (navigator.share) {
    navigator.share({title: 'SOS Planet — Le Jeu', text: text, url: location.href});
  } else {
    navigator.clipboard.writeText(text + ' ' + location.href);
    showAchievement('📋', 'Lien copie !', 'Envoie-le a tes amis');
  }
};

// Expose to onclick
window.completeQuest = completeQuest;
window.contributeBoss = contributeBoss;

// ===== TABS =====
var TABS = [
  {id:'quests', label:'Quetes', notif:true},
  {id:'boss', label:'Boss'},
  {id:'collection', label:'Collection'},
  {id:'leaderboard', label:'Classement'}
];
var activeTab = 'quests';

function renderTabs() {
  var html = '';
  TABS.forEach(function(t) {
    html += '<div class="gtab' + (activeTab === t.id ? ' active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' +
      t.label + (t.notif && state.todayDone.length < 3 ? '<span class="notif"></span>' : '') + '</div>';
  });
  document.getElementById('game-tabs').innerHTML = html;
}

window.switchTab = function(id) {
  activeTab = id;
  renderTabs();
  TABS.forEach(function(t) {
    var panel = document.getElementById('panel-' + t.id);
    panel.classList.toggle('active', t.id === id);
  });
};

// ===== INIT =====
checkStreak();
getDailyQuests();
renderTabs();
renderQuests();
renderBoss();
renderCollection();
renderLeaderboard();
updateUI();
switchTab('quests');

})();
</script>
