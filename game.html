<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23059669'/><text x='50' y='70' font-size='60' text-anchor='middle'>🌍</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>SOS Planet — Le Jeu</title>
<meta name="theme-color" content="#0A0E1A">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E1A;--card:rgba(255,255,255,0.06);--card-b:rgba(255,255,255,0.1);
  --green:#10B981;--gold:#FBBF24;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;
  --pink:#EC4899;--orange:#F97316;--text:#E8E4DC;--dim:#6B7280;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* Animated stars */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,.3),transparent),radial-gradient(1.5px 1.5px at 50% 10%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 70% 40%,rgba(255,255,255,.3),transparent),radial-gradient(1.5px 1.5px at 90% 80%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 15% 55%,rgba(255,255,255,.4),transparent),radial-gradient(1.5px 1.5px at 85% 15%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 45% 85%,rgba(255,255,255,.3),transparent);pointer-events:none;z-index:0;animation:star-twinkle 4s ease-in-out infinite alternate}
@keyframes star-twinkle{0%{opacity:.7}100%{opacity:1}}

.app{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:0 0 90px}
.app.shake{animation:screen-shake .4s ease}
@keyframes screen-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* Top bar */
.topbar{display:flex;align-items:center;padding:12px 16px;gap:8px}
.topbar a{font-size:.75rem;font-weight:600;color:var(--green);text-decoration:none}
.topbar h1{flex:1;text-align:center;font-size:.85rem;font-weight:800;letter-spacing:-.02em}
.streak-badge{display:flex;align-items:center;gap:4px;font-size:.75rem;font-weight:800;color:var(--gold);background:rgba(251,191,36,.12);padding:3px 8px;border-radius:12px}
.streak-badge.dead{color:var(--dim);background:rgba(255,255,255,.05)}
.coins-badge{display:flex;align-items:center;gap:3px;font-size:.75rem;font-weight:800;color:var(--green);background:rgba(16,185,129,.12);padding:3px 8px;border-radius:12px}

/* XP Bar */
.xp-section{padding:0 16px 8px}
.xp-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.xp-level{font-size:.65rem;font-weight:800;color:var(--gold);background:rgba(251,191,36,.15);padding:2px 8px;border-radius:8px;white-space:nowrap}
.xp-bar-wrap{flex:1;height:12px;background:rgba(255,255,255,.06);border-radius:8px;overflow:hidden;position:relative}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--green),#34D399,var(--gold));border-radius:8px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
.xp-bar.pulse{animation:xp-pulse .5s ease}
@keyframes xp-pulse{0%{filter:brightness(1)}50%{filter:brightness(1.8)}100%{filter:brightness(1)}}
.xp-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 50%);border-radius:8px}
.xp-text{font-size:.6rem;color:var(--dim);text-align:right;margin-top:1px}

/* ===== CANVAS PLANET ===== */
.planet-zone{text-align:center;padding:0 0 12px;position:relative;touch-action:none}
#planet-canvas{display:block;margin:0 auto;cursor:pointer;border-radius:50%}
.planet-label{font-size:.75rem;font-weight:700;color:var(--dim);margin-top:6px}

/* Floating +XP */
.float-xp{position:fixed;font-size:1.2rem;font-weight:900;color:var(--gold);pointer-events:none;z-index:9999;text-shadow:0 2px 8px rgba(0,0,0,.5);animation:float-up 1.2s ease-out forwards}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-60px) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(.8)}}

/* ===== DAILY SPIN WHEEL ===== */
.spin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s}
.spin-overlay.show{opacity:1;pointer-events:auto}
.spin-title{font-size:1.1rem;font-weight:900;color:var(--gold);margin-bottom:16px;text-align:center}
.spin-subtitle{font-size:.75rem;color:var(--dim);margin-bottom:20px;text-align:center}
.wheel-wrap{position:relative;width:280px;height:280px}
#wheel-canvas{width:280px;height:280px;transition:transform 4s cubic-bezier(.17,.67,.12,.99)}
.wheel-pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:2rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));z-index:2}
.spin-btn{margin-top:24px;padding:16px 48px;border:none;border-radius:30px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;font-size:1rem;font-weight:900;cursor:pointer;letter-spacing:.02em;box-shadow:0 4px 20px rgba(251,191,36,.4);transition:transform .2s}
.spin-btn:active{transform:scale(.95)}
.spin-result{margin-top:16px;font-size:1.2rem;font-weight:900;color:var(--gold);opacity:0;transition:opacity .4s}
.spin-result.show{opacity:1}
.spin-close{margin-top:12px;padding:10px 30px;border:2px solid rgba(255,255,255,.2);background:none;color:var(--text);font-size:.8rem;font-weight:700;border-radius:20px;cursor:pointer;opacity:0;transition:opacity .4s}
.spin-close.show{opacity:1}

/* ===== GARDEN ===== */
.garden-section{padding:0 16px 16px}
.garden-title{font-size:.75rem;font-weight:800;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.garden-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.garden-slot{aspect-ratio:1;background:var(--card);border:1px solid var(--card-b);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;user-select:none}
.garden-slot:active{transform:scale(.93)}
.garden-slot.empty{border-style:dashed;border-color:rgba(255,255,255,.1)}
.garden-slot .slot-emoji{font-size:1.8rem;transition:transform .3s}
.garden-slot.ready .slot-emoji{animation:bounce-ready .6s ease infinite}
@keyframes bounce-ready{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.garden-slot .slot-timer{font-size:.55rem;font-weight:700;color:var(--dim)}
.garden-slot.ready{border-color:var(--gold);background:rgba(251,191,36,.08)}
.garden-slot.ready .slot-timer{color:var(--gold)}
.garden-slot .slot-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--green);border-radius:0 0 14px 14px;transition:width 1s linear}

/* ===== TABS ===== */
.game-tabs{display:flex;gap:4px;padding:0 16px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.game-tabs::-webkit-scrollbar{display:none}
.gtab{padding:7px 14px;border-radius:20px;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--card-b);background:var(--card);color:var(--dim);transition:all .2s;user-select:none;position:relative}
.gtab:active{transform:scale(.95)}
.gtab.active{background:var(--green);color:#fff;border-color:var(--green)}
.gtab .notif{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg)}

/* Panels */
.panel{display:none;padding:0 16px}
.panel.active{display:block}

/* ===== QUEST CARDS ===== */
.quest-header{font-size:.7rem;font-weight:800;color:var(--dim);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.quest-bonus{font-size:.65rem;color:var(--gold);font-weight:700;background:rgba(251,191,36,.1);padding:2px 8px;border-radius:8px}
.quest-card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:14px;margin-bottom:8px;display:flex;gap:10px;align-items:center;transition:all .3s;position:relative;overflow:hidden}
.quest-card:active{transform:scale(.98)}
.quest-card.done{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06)}
.quest-card.done .quest-check{display:flex}
.quest-emoji{font-size:1.8rem;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:12px;flex-shrink:0}
.quest-info{flex:1;min-width:0}
.quest-title{font-size:.8rem;font-weight:700;line-height:1.3;margin-bottom:2px}
.quest-meta{display:flex;gap:8px;align-items:center}
.quest-xp{font-size:.65rem;color:var(--gold);font-weight:800}
.quest-coins{font-size:.65rem;color:var(--green);font-weight:700}
.quest-cat{font-size:.55rem;color:var(--dim);background:rgba(255,255,255,.05);padding:1px 6px;border-radius:6px}
.quest-btn{width:42px;height:42px;border:none;border-radius:50%;font-size:1rem;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.quest-btn.do{background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.quest-btn.do:active{transform:scale(.9);box-shadow:0 2px 6px rgba(16,185,129,.3)}
.quest-check{display:none;width:42px;height:42px;align-items:center;justify-content:center;font-size:1.4rem;color:var(--green);flex-shrink:0}

/* ===== BOSS ===== */
.boss-card{background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(236,72,153,.08));border:1.5px solid rgba(139,92,246,.2);border-radius:18px;padding:20px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.boss-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(139,92,246,.15),transparent 70%);pointer-events:none}
.boss-emoji{font-size:3.5rem;display:block;margin-bottom:8px;animation:boss-idle 3s ease-in-out infinite;position:relative}
@keyframes boss-idle{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-4px) scale(1.02)}75%{transform:translateY(2px) scale(.99)}}
.boss-hp-label{font-size:.65rem;font-weight:800;color:var(--purple);margin-bottom:4px;letter-spacing:.05em}
.boss-title{font-size:1rem;font-weight:900;color:var(--text);margin-bottom:4px}
.boss-desc{font-size:.75rem;color:var(--dim);margin-bottom:14px;line-height:1.4}
.boss-hp-bar{height:16px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin-bottom:6px;position:relative}
.boss-hp{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:10px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.boss-hp::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2) 0%,transparent 50%);border-radius:10px}
.boss-hp.hit{animation:boss-hit .3s ease}
@keyframes boss-hit{0%{filter:brightness(1)}50%{filter:brightness(2)}100%{filter:brightness(1)}}
.boss-count{font-size:.65rem;color:var(--dim);margin-bottom:12px}
.boss-attack-btn{padding:14px 0;border:none;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:.9rem;font-weight:800;cursor:pointer;width:100%;letter-spacing:.02em;box-shadow:0 4px 20px rgba(139,92,246,.3);transition:all .2s;position:relative;overflow:hidden}
.boss-attack-btn:active{transform:scale(.96)}
.boss-attack-btn .btn-flash{position:absolute;inset:0;background:rgba(255,255,255,.3);opacity:0;transition:opacity .1s}
.boss-reward{margin-top:10px;padding:6px 14px;background:rgba(251,191,36,.08);border-radius:10px;display:inline-block;font-size:.7rem;font-weight:700;color:var(--gold)}

/* ===== SHOP ===== */
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.shop-item{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:14px;text-align:center;transition:all .3s;cursor:pointer}
.shop-item:active{transform:scale(.96)}
.shop-item.owned{border-color:var(--green);opacity:.5}
.shop-emoji{font-size:2.2rem;display:block;margin-bottom:6px}
.shop-name{font-size:.75rem;font-weight:700;margin-bottom:4px}
.shop-price{font-size:.7rem;font-weight:800;color:var(--green)}
.shop-owned{font-size:.65rem;color:var(--green)}

/* ===== COLLECTION ===== */
.collect-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.collect-item{background:var(--card);border:1px solid var(--card-b);border-radius:12px;padding:10px 4px;text-align:center;transition:all .3s}
.collect-item.unlocked{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06)}
.collect-item.locked{opacity:.25;filter:grayscale(1)}
.collect-item.unlocked:active{transform:scale(.9)}
.collect-emoji{font-size:1.8rem;display:block;margin-bottom:2px}
.collect-name{font-size:.55rem;font-weight:700;color:var(--dim)}
.collect-item.unlocked .collect-name{color:var(--text)}
.collect-req{font-size:.5rem;color:var(--gold);margin-top:1px}

/* ===== LEADERBOARD ===== */
.lb-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--card-b);border-radius:12px;margin-bottom:6px;transition:all .3s}
.lb-item.me{border-color:var(--green);background:rgba(16,185,129,.06)}
.lb-rank{font-size:1.1rem;font-weight:900;width:28px;text-align:center;flex-shrink:0}
.lb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:rgba(255,255,255,.06)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:.75rem;font-weight:700}
.lb-xp{font-size:.65rem;color:var(--dim)}
.lb-lvl{font-size:.6rem;color:var(--gold);font-weight:700;padding:2px 6px;background:rgba(251,191,36,.1);border-radius:6px}
.invite-btn{display:block;width:100%;padding:12px;border:2px solid var(--green);background:transparent;color:var(--green);border-radius:14px;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:12px;transition:all .2s}
.invite-btn:active{background:var(--green);color:#fff}

/* ===== LEVEL UP ===== */
.lvlup{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10001;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.lvlup.show{opacity:1;pointer-events:auto}
.lvlup-inner{text-align:center;animation:lvlup-pop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes lvlup-pop{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
.lvlup-emoji{font-size:5rem;display:block;margin-bottom:8px;animation:lvlup-bounce 1s ease infinite}
@keyframes lvlup-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.lvlup-title{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lvlup-sub{font-size:.85rem;color:var(--dim);margin:6px 0 8px}
.lvlup-unlock{font-size:.8rem;color:var(--green);font-weight:700;margin-bottom:16px}
.lvlup-btn{padding:14px 48px;border:none;border-radius:30px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(251,191,36,.4)}

/* ===== PARTICLES ===== */
.particle{position:fixed;pointer-events:none;z-index:9998;border-radius:50%}
.confetti{position:fixed;top:-10px;z-index:10002;pointer-events:none;animation:conf-fall 2s ease-out forwards}
@keyframes conf-fall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}

/* ===== TOAST ===== */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(0,0,0,.9);border:1px solid var(--gold);border-radius:16px;padding:16px 24px;z-index:9999;text-align:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.show{transform:translate(-50%,-50%) scale(1)}
.toast-emoji{font-size:2.2rem;display:block;margin-bottom:4px}
.toast-text{font-size:.85rem;font-weight:800;color:var(--gold)}
.toast-sub{font-size:.7rem;color:var(--dim);margin-top:2px}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,.96);backdrop-filter:blur(12px);border-top:1px solid var(--card-b);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav a{flex:1;text-align:center;padding:7px 4px 5px;font-size:.55rem;font-weight:600;color:var(--dim);text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:1px;transition:color .2s}
.bnav a.active{color:var(--green)}
.bnav a span{font-size:1.15rem}

.game-footer{text-align:center;padding:24px 16px;font-size:.55rem;color:var(--dim);line-height:1.5}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Top bar -->
  <div class="topbar">
    <a href="index.html">&#8592;</a>
    <div class="coins-badge" id="coins-badge">🌿 <span id="coins-num">0</span></div>
    <h1>SOS Planet</h1>
    <div class="streak-badge" id="streak"><span id="streak-icon">🔥</span> <span id="streak-num">0</span></div>
  </div>

  <!-- XP Bar -->
  <div class="xp-section">
    <div class="xp-row">
      <div class="xp-level" id="level-badge">Niv. 1</div>
      <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>

    <div class="xp-text" id="xp-text">0 / 100 XP</div>
  </div>

  <!-- Planet Canvas -->
  <div class="planet-zone" id="planet-zone">
    <canvas id="planet-canvas" width="440" height="300"></canvas>

  </div>

  <!-- Garden -->
  <div class="garden-section">

    <div class="garden-grid" id="garden-grid"></div>
  </div>

  <!-- Tabs -->
  <div class="game-tabs" id="game-tabs"></div>

  <!-- Panels -->

  <div class="panel" id="panel-shop"></div>
  <div class="panel" id="panel-collection"></div>
  <div class="panel" id="panel-leaderboard"></div>
</div>

<!-- Spin wheel overlay -->
<div class="spin-overlay" id="spin-overlay">
  <div class="spin-title">🎰 Roue quotidienne !</div>
  <div class="spin-subtitle">Tourne la roue pour gagner ton bonus du jour</div>
  <div class="wheel-wrap">
    <div class="wheel-pointer">🔻</div>
    <canvas id="wheel-canvas" width="280" height="280"></canvas>
  </div>
  <button class="spin-btn" id="spin-btn" onclick="spinWheel()">TOURNER !</button>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-emoji" id="toast-emoji"></span>
  <div class="toast-text" id="toast-text"></div>
  <div class="toast-sub" id="toast-sub"></div>
</div>

<!-- Level up -->
<div class="lvlup" id="lvlup">
  <div class="lvlup-inner">
    <span class="lvlup-emoji" id="lvlup-emoji"></span>
    <div class="lvlup-title" id="lvlup-title"></div>
    <div class="lvlup-sub" id="lvlup-sub"></div>
    <div class="lvlup-unlock" id="lvlup-unlock"></div>
    <button class="lvlup-btn" onclick="closeLvlUp()">TROP BIEN !</button>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bnav">
  <a href="index.html"><span>🏠</span>Accueil</a>
  <a href="game.html" class="active"><span>🎮</span>Jouer</a>
  <a href="engagements.html"><span>📋</span>Gestes</a>
  <a href="videos.html"><span>📹</span>Videos</a>
  <a href="projets.html"><span>🌱</span>Projets</a>
</nav>

<script>
(function(){
'use strict';

// ============================================================
// GAME DATA
// ============================================================

var LEVELS = [
  {n:'Graine',     e:'🌱', xp:0},
  {n:'Pousse',     e:'🌿', xp:100},
  {n:'Bourgeon',   e:'🌳', xp:300},
  {n:'Foret',      e:'🌲', xp:600},
  {n:'Riviere',    e:'💧', xp:1000},
  {n:'Ocean',      e:'🌊', xp:1600},

// AUDIO ENGINE
// ============================================================
var actx;
function A(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}

function snd(type){
  var c=A(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);
  var t=c.currentTime;
  if(type==='xp'){
    o.type='sine';o.frequency.setValueAtTime(660,t);o.frequency.exponentialRampToValueAtTime(1320,t+.08);
    g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);
  } else if(type==='coin'){
    o.type='sine';o.frequency.setValueAtTime(1047,t);o.frequency.setValueAtTime(1319,t+.06);
    g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.start(t);o.stop(t+.18);
  } else if(type==='lvl'){
    o.type='sine';[523,659,784,1047].forEach(function(f,i){o.frequency.setValueAtTime(f,t+i*.1)});
    g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.6);
  } else if(type==='hit'){
    o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(600,t+.05);
    o.frequency.exponentialRampToValueAtTime(100,t+.15);
    g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);
  } else if(type==='harvest'){
    o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.setValueAtTime(1100,t+.05);
    o.frequency.setValueAtTime(1320,t+.1);o.frequency.setValueAtTime(1760,t+.15);
    g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.35);
  } else if(type==='plant'){
    o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(660,t+.1);
    g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);
  } else if(type==='spin'){
    o.type='triangle';o.frequency.setValueAtTime(300,t);
    for(var i=0;i<20;i++){o.frequency.setValueAtTime(300+i*40,t+i*.15)}
    g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+3);o.start(t);o.stop(t+3);
  } else if(type==='win'){
    o.type='sine';[523,659,784,1047,1319].forEach(function(f,i){o.frequency.setValueAtTime(f,t+i*.08)});
    g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.6);
  }
}

function getLvl(){for(var i=LEVELS.length-1;i>=0;i--)if(S.xp>=LEVELS[i].xp)return i;return 0}
function today(){return new Date().toISOString().slice(0,10)}
function yesterday(){return new Date(Date.now()-864e5).toISOString().slice(0,10)}

function floatXP(txt,x,y){
  var el=document.createElement('div');el.className='float-xp';el.textContent=txt;
  el.style.left=x+'px';el.style.top=y+'px';document.body.appendChild(el);
  setTimeout(function(){el.remove()},1300);
}

function toast(emoji,text,sub){
  var t=document.getElementById('toast');
  document.getElementById('toast-emoji').textContent=emoji;
  document.getElementById('toast-text').textContent=text;
  document.getElementById('toast-sub').textContent=sub||'';
  t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800);
}

function shake(){var a=document.getElementById('app');a.classList.add('shake');setTimeout(function(){a.classList.remove('shake')},400)}

function particles(x,y,color,count){
  for(var i=0;i<(count||12);i++){
    var p=document.createElement('div');p.className='particle';
    p.style.left=x+'px';p.style.top=y+'px';p.style.width=p.style.height=(3+Math.random()*5)+'px';
    p.style.background=color||'#FBBF24';
    var angle=Math.random()*Math.PI*2,speed=60+Math.random()*80;
    var dx=Math.cos(angle)*speed,dy=Math.sin(angle)*speed;
    document.body.appendChild(p);
    p.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:'translate('+dx+'px,'+dy+'px) scale(0)',opacity:0}
    ],{duration:600+Math.random()*400,easing:'ease-out'});
    setTimeout(function(el){el.remove()}.bind(null,p),1100);
  }
}

function confetti(n){
  var colors=['#10B981','#FBBF24','#EF4444','#3B82F6','#8B5CF6','#EC4899','#F97316'];
  for(var i=0;i<(n||40);i++){
    var c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[i%colors.length];
    c.style.width=c.style.height=(5+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDelay=Math.random()*.6+'s';
    document.body.appendChild(c);
    setTimeout(function(el){el.remove()}.bind(null,c),2800);
  }
}

// ============================================================
var wheelDrawn=false;
function drawWheel(){
  if(wheelDrawn)return;wheelDrawn=true;
  var cv=document.getElementById('wheel-canvas'),ctx=cv.getContext('2d');
  var n=WHEEL_PRIZES.length,arc=Math.PI*2/n,r=140;
  var colors=['#10B981','#FBBF24','#8B5CF6','#EC4899','#3B82F6','#F97316','#EF4444','#14B8A6'];
  for(var i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(r,r);ctx.arc(r,r,r,i*arc,(i+1)*arc);ctx.fillStyle=colors[i%colors.length];ctx.fill();
    ctx.save();ctx.translate(r,r);ctx.rotate(i*arc+arc/2);ctx.fillStyle='#fff';ctx.font='bold 13px system-ui';ctx.textAlign='center';
    ctx.fillText(WHEEL_PRIZES[i].e,r*.6,4);ctx.font='bold 9px system-ui';ctx.fillText(WHEEL_PRIZES[i].label,r*.6,16);
    ctx.restore();
  }
  // center
  ctx.beginPath();ctx.arc(r,r,18,0,Math.PI*2);ctx.fillStyle='#0A0E1A';ctx.fill();
  ctx.beginPath();ctx.arc(r,r,16,0,Math.PI*2);ctx.fillStyle='#FBBF24';ctx.fill();
}

function showWheel(){
  if(S.spinDay===today())return; // already spun
  drawWheel();
  document.getElementById('spin-overlay').classList.add('show');
  document.getElementById('spin-result').classList.remove('show');
  document.getElementById('spin-close').classList.remove('show');
}

window.spinWheel=function(){
  var btn=document.getElementById('spin-btn');
  if(btn.disabled)return;btn.disabled=true;
  snd('spin');
  var idx=Math.floor(Math.random()*WHEEL_PRIZES.length);
  var arc=360/WHEEL_PRIZES.length;
  var deg=3600+360-idx*arc-arc/2; // land on prize
  var cv=document.getElementById('wheel-canvas');
  cv.style.transform='rotate('+deg+'deg)';
  S.spinDay=today();save();
  setTimeout(function(){
    var prize=WHEEL_PRIZES[idx];
    snd('win');vibrate(100);confetti(30);
    if(prize.xp)S.xp+=prize.xp;
    if(prize.c)S.coins+=prize.c;
    save();updateUI();
    document.getElementById('spin-result').textContent=prize.e+' '+prize.label+' !';
    document.getElementById('spin-result').classList.add('show');
    document.getElementById('spin-close').classList.add('show');
  },4200);
};

window.closeWheel=function(){
  document.getElementById('spin-overlay').classList.remove('show');
};

var pCtx,pW=440,pH=300;
function initPlanet(){
  var cv=document.getElementById('planet-canvas');
  pCtx=cv.getContext('2d');
  cv.addEventListener('click',function(ev){
    // Tap planet = small XP reward (max 3x per day)
    var taps=parseInt(sessionStorage.getItem('ptaps')||'0');
    if(taps>=5)return;
    sessionStorage.setItem('ptaps',''+(taps+1));
    var r=cv.getBoundingClientRect();
    gainXP(5,ev.clientX,ev.clientY);
    particles(ev.clientX,ev.clientY,'#10B981',10);
  });
}

function drawPlanet(){
  if(!pCtx)return;
  var ctx=pCtx,lvl=getLvl();
  ctx.clearRect(0,0,pW,pH);

  // Planet body
  var cx=pW/2,cy=pH/2,r=100;
  var grad=ctx.createRadialGradient(cx-25,cy-25,20,cx,cy,r);

  // Colors by level
  var planetColors=[
    ['#8B8B8B','#5B5B5B','#3A3A3A'],          // 0 grey rock
    ['#6B8B5E','#4B6043','#2A3B22'],          // 1 moss
    ['#4D9B4D','#2D7028','#1A4D1A'],          // 2 green
    ['#3D8B3D','#1A6B1A','#0D4D0D'],          // 3 forest
    ['#2D8B5E','#1A6B4D','#1565A0'],          // 4 river
    ['#1A6B8B','#0C4D6B','#1565C0'],          // 5 ocean
    ['#4D8B3D','#6B8B14','#D4A017'],          // 6 savane
    ['#0D7B3D','#0B5E2A','#2D8B2D'],          // 7 jungle
    ['#1B8B50','#8B6914','#3B82F6'],          // 8 continent
    ['#15915D','#2563EB','#D4A017'],          // 9 green planet
    ['#10B981','#3B82F6','#FBBF24']           // 10 galaxy
  ][Math.min(lvl,10)];

  grad.addColorStop(0,planetColors[0]);grad.addColorStop(.6,planetColors[1]);grad.addColorStop(1,planetColors[2]);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();

  // Atmosphere glow
  var atm=ctx.createRadialGradient(cx,cy,r-5,cx,cy,r+20);
  atm.addColorStop(0,'rgba(16,185,129,0)');
  atm.addColorStop(.5,'rgba(16,185,129,'+(0.05+lvl*0.02)+')');
  atm.addColorStop(1,'rgba(16,185,129,0)');
  ctx.beginPath();ctx.arc(cx,cy,r+20,0,Math.PI*2);ctx.fillStyle=atm;ctx.fill();

  // Surface details based on level
  if(lvl>=1) drawTrees(ctx,cx,cy,r,Math.min(lvl*3,20));
  if(lvl>=4) drawWater(ctx,cx,cy,r);
  if(lvl>=6) drawClouds(ctx,cx,cy,r);

  // Creatures orbiting
  var unlocked=CREATURES.filter(function(c){return(getLvl()+1)>=c.l});
  var showing=unlocked.slice(-4);
  var t=Date.now()/2000;
  showing.forEach(function(c,i){
    var angle=t+i*(Math.PI*2/showing.length);
    var ox=cx+Math.cos(angle)*(r+25);
    var oy=cy+Math.sin(angle)*30+Math.sin(t*1.5+i)*8;
    ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.e,ox,oy);
  });

  // Decorations
  if(S.ownedDeco.indexOf('gold-aura')!==-1){
    var ag=ctx.createRadialGradient(cx,cy,r,cx,cy,r+35);
    ag.addColorStop(0,'rgba(251,191,36,0.1)');ag.addColorStop(.5,'rgba(251,191,36,0.05)');ag.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,r+35,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
  }
  if(S.ownedDeco.indexOf('shooting-stars')!==-1){
    for(var s=0;s<3;s++){
      var sx=50+Math.sin(t*2+s*2)*180,sy=20+Math.cos(t*1.5+s*3)*40;
      ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+15,sy+8);ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();
    }
  }
  if(S.ownedDeco.indexOf('rainbow')!==-1){
    ctx.beginPath();ctx.arc(cx,cy+60,130,Math.PI,0);ctx.lineWidth=4;
    var rg=ctx.createLinearGradient(cx-130,0,cx+130,0);
    rg.addColorStop(0,'#EF4444');rg.addColorStop(.17,'#F97316');rg.addColorStop(.33,'#FBBF24');
    rg.addColorStop(.5,'#10B981');rg.addColorStop(.67,'#3B82F6');rg.addColorStop(.83,'#6366F1');rg.addColorStop(1,'#8B5CF6');
    ctx.strokeStyle=rg;ctx.stroke();
  }
  if(S.ownedDeco.indexOf('ufo')!==-1){
    var ux=cx+Math.cos(t*0.8)*120,uy=cy-80+Math.sin(t)*15;
    ctx.font='20px serif';ctx.fillText('🛸',ux,uy);
  }

  requestAnimationFrame(drawPlanet);
}

function drawTrees(ctx,cx,cy,r,count){
  var seed=42;function rng(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646}
  for(var i=0;i<count;i++){
    var a=rng()*Math.PI*2,d=rng()*r*.7;
    var tx=cx+Math.cos(a)*d,ty=cy+Math.sin(a)*d;
    ctx.fillStyle='#0D5016';ctx.beginPath();
    ctx.moveTo(tx,ty-8);ctx.lineTo(tx-4,ty+2);ctx.lineTo(tx+4,ty+2);ctx.fill();
  }
}

function drawWater(ctx,cx,cy,r){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='rgba(37,99,235,0.25)';
  ctx.beginPath();ctx.ellipse(cx+30,cy+20,40,25,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx-40,cy-10,25,15,-0.2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawClouds(ctx,cx,cy,r){
  var t=Date.now()/8000;
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r+5,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.15)';
  for(var i=0;i<3;i++){
    var a=t+i*2.1;
    ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*r*.6,cy-r*.3+i*20,30,10,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ============================================================
// GARDEN
// ============================================================
function renderGarden(){
  var html='';
  S.garden.forEach(function(slot,i){
    if(!slot){
      html+='<div class="garden-slot empty" onclick="plantSeed('+i+')"><span class="slot-emoji">+</span><span class="slot-timer">Planter</span></div>';
    } else {
      var elapsed=(Date.now()-slot.planted)/1000;
      var plant=GARDEN_PLANTS[slot.type];
      var ready=elapsed>=plant.time;
      var pct=Math.min(100,elapsed/plant.time*100);
      var stages=['🌱','🌿',plant.e];
      var stage=ready?2:pct>50?1:0;
      var timeLeft=Math.max(0,Math.ceil(plant.time-elapsed));
      var tStr=timeLeft>60?Math.ceil(timeLeft/60)+'min':timeLeft+'s';
      html+='<div class="garden-slot'+(ready?' ready':'')+'" onclick="'+(ready?'harvestSlot('+i+')':'')+'">'+
        '<span class="slot-emoji">'+stages[stage]+'</span>'+
        '<span class="slot-timer">'+(ready?'RECOLTER !':tStr)+'</span>'+
        '<div class="slot-progress" style="width:'+pct+'%"></div></div>';
    }
  });
  document.getElementById('garden-grid').innerHTML=html;
}

window.plantSeed=function(idx){
  // Pick best available seed
  var available=S.ownedSeeds.slice();
  if(available.length===0){toast('🌱','Pas de graines !','Achete-en dans la boutique');return}
  var seedIdx=available[available.length-1]; // best seed
  var plant=GARDEN_PLANTS[seedIdx];
  if(plant.cost>0&&S.coins<plant.cost){toast('🌿','Pas assez de pieces !','Il te faut '+plant.cost+' 🌿');return}
  S.garden[idx]={type:seedIdx,planted:Date.now()};
  // Remove one seed if not free
  if(seedIdx>0){var si=S.ownedSeeds.lastIndexOf(seedIdx);if(si!==-1)S.ownedSeeds.splice(si,1)}
  save();snd('plant');vibrate(20);renderGarden();
};

window.harvestSlot=function(idx){
  var slot=S.garden[idx];if(!slot)return;
  var plant=GARDEN_PLANTS[slot.type];
  S.garden[idx]=null;save();
  snd('harvest');vibrate(50);shake();
  var r=document.getElementById('garden-grid').children[idx].getBoundingClientRect();
  gainXP(plant.xp,r.left+r.width/2,r.top);
  gainCoins(plant.c,r.left+r.width/2,r.top+30);
  particles(r.left+r.width/2,r.top+r.height/2,'#10B981',15);
  toast(plant.e,'+'+plant.xp+' XP  +'+plant.c+' 🌿','Recolte !');
  renderGarden();
};

// Auto refresh garden timers
setInterval(renderGarden,5000);

// ============================================================
// QUESTS
// ============================================================
function getQuests(){
  var d=today();
  if(S.quests.length===3&&S.lastDay===d)return S.quests;
  var pool=QUESTS.slice(),picked=[];
  for(var i=0;i<3;i++){var r=Math.floor(Math.random()*pool.length);picked.push(pool.splice(r,1)[0])}
  S.quests=picked;S.done=[];S.lastDay=d;save();return picked;
}

function renderQuests(){
  var q=getQuests();
  var html='<div class="quest-header"><span>QUETES DU JOUR ('+S.done.length+'/3)</span>'+
    (S.done.length===3?'<span class="quest-bonus">COMBO +50 XP !</span>':'')+'</div>';
  q.forEach(function(quest,i){
    var done=S.done.indexOf(i)!==-1;
    html+='<div class="quest-card'+(done?' done':'')+'" id="quest-'+i+'">'+
      '<div class="quest-emoji">'+quest.e+'</div>'+
      '<div class="quest-info"><div class="quest-title">'+quest.t+'</div>'+
      '<div class="quest-meta"><span class="quest-xp">+'+quest.xp+' XP</span><span class="quest-coins">+'+quest.c+' 🌿</span>'+
      '<span class="quest-cat">'+quest.cat+'</span></div></div>'+
      (done?'<div class="quest-check">✓</div>':'<button class="quest-btn do" onclick="doQuest('+i+',event)">✓</button>')+
    '</div>';
  });
  document.getElementById('panel-quests').innerHTML=html;
}

window.doQuest=function(i,ev){
  if(S.done.indexOf(i)!==-1)return;
  S.done.push(i);
  var d=today();
  if(S.lastDay!==d){S.streak=S.lastDay===yesterday()?S.streak+1:1;S.lastDay=d}
  S.totalQ++;save();
  var q=S.quests[i];
  var r=ev.target.getBoundingClientRect();
  gainXP(q.xp,r.left,r.top);
  gainCoins(q.c,r.left,r.top+20);
  shake();vibrate(60);
  renderQuests();
  // Combo bonus
  if(S.done.length===3){
    setTimeout(function(){
      gainXP(50,window.innerWidth/2,window.innerHeight/2);
      confetti(40);toast('⭐','COMBO BONUS !','+50 XP pour 3/3 quetes');
    },1000);
  }
};

// ============================================================
// BOSS
// ============================================================
function renderBoss(){
  var b=BOSSES[S.bossIdx%BOSSES.length];
  var pct=Math.min(100,Math.round(S.bossHp/b.g*100));
  document.getElementById('panel-boss').innerHTML=
    '<div class="boss-card"><div class="boss-hp-label">DEFI COLLECTIF</div>'+
    '<span class="boss-emoji" id="boss-sprite">'+b.e+'</span>'+
    '<div class="boss-title">'+b.t+'</div><div class="boss-desc">'+b.d+'</div>'+
    '<div class="boss-hp-bar"><div class="boss-hp" id="boss-hp-bar" style="width:'+pct+'%"></div></div>'+
    '<div class="boss-count">'+S.bossHp+' / '+b.g+' — '+pct+'%</div>'+
    '<button class="boss-attack-btn" onclick="attackBoss(event)"><span class="btn-flash" id="boss-flash"></span>⚔️ ATTAQUER !</button>'+
    '<div class="boss-reward">Recompense : +'+b.r+' XP  +'+b.rc+' 🌿</div></div>';
}

window.attackBoss=function(ev){
  var dmg=1+Math.floor(Math.random()*8);
  S.bossHp+=dmg;
  snd('hit');vibrate(80);shake();
  var r=ev.target.getBoundingClientRect();
  floatXP('-'+dmg+' HP',r.left+r.width/2,r.top-20);
  particles(r.left+r.width/2,r.top,'#8B5CF6',12);
  // Flash
  var flash=document.getElementById('boss-flash');
  if(flash){flash.style.opacity='1';setTimeout(function(){flash.style.opacity='0'},100)}
  // Boss HP bar animation
  var bar=document.getElementById('boss-hp-bar');
  if(bar){bar.classList.add('hit');setTimeout(function(){bar.classList.remove('hit')},300)}
  // Boss sprite shake
  var sprite=document.getElementById('boss-sprite');
  if(sprite){sprite.style.transform='scale(1.2) rotate(5deg)';setTimeout(function(){sprite.style.transform=''},200)}

  var b=BOSSES[S.bossIdx%BOSSES.length];
  if(S.bossHp>=b.g){
    S.bossHp=0;S.bossIdx++;save();
    setTimeout(function(){
      gainXP(b.r,window.innerWidth/2,window.innerHeight/2);
      gainCoins(b.rc,window.innerWidth/2,window.innerHeight/2+30);
      confetti(50);toast('🏆','BOSS VAINCU !',b.t+' detruit !');snd('win');
      renderBoss();
    },400);
  } else {save();renderBoss()}
};

// ============================================================
// SHOP
// ============================================================
function renderShop(){
  var html='<div style="font-size:.7rem;font-weight:800;color:var(--dim);margin-bottom:8px">BOUTIQUE</div>';
  html+='<div class="shop-grid">';
  SHOP_ITEMS.forEach(function(item,i){
    var owned=item.type==='deco'&&S.ownedDeco.indexOf(item.id)!==-1;
    html+='<div class="shop-item'+(owned?' owned':'')+'" onclick="buyItem('+i+')">'+
      '<span class="shop-emoji">'+item.e+'</span>'+
      '<div class="shop-name">'+item.n+'</div>'+
      (owned?'<div class="shop-owned">Possede</div>':'<div class="shop-price">'+item.price+' 🌿</div>')+
    '</div>';
  });
  html+='</div>';
  document.getElementById('panel-shop').innerHTML=html;
}

window.buyItem=function(i){
  var item=SHOP_ITEMS[i];
  if(item.type==='deco'&&S.ownedDeco.indexOf(item.id)!==-1){toast(item.e,'Deja possede !','');return}
  if(S.coins<item.price){toast('🌿','Pas assez de pieces !','Il te faut '+item.price+' 🌿');return}
  S.coins-=item.price;
  if(item.type==='seed'){S.ownedSeeds.push(item.seedIdx);toast(item.e,'Graines achetees !','Plante-les dans ton jardin')}
  else{S.ownedDeco.push(item.id);toast(item.e,'Decoration achetee !','Regarde ta planete !')}
  save();snd('coin');vibrate(30);renderShop();updateUI();
};

// ============================================================
// COLLECTION
// ============================================================
function renderCollection(){
  var lvl=getLvl()+1;
  var u=CREATURES.filter(function(c){return lvl>=c.l}).length;
  var html='<div style="font-size:.7rem;font-weight:800;color:var(--dim);margin-bottom:8px">'+u+'/'+CREATURES.length+' CREATURES</div>';
  html+='<div class="collect-grid">';
  CREATURES.forEach(function(c){
    var un=lvl>=c.l;
    html+='<div class="collect-item '+(un?'unlocked':'locked')+'">'+
      '<span class="collect-emoji">'+(un?c.e:'❓')+'</span>'+
      '<div class="collect-name">'+(un?c.n:'???')+'</div>'+
      '<div class="collect-req">Niv. '+c.l+'</div></div>';
  });
  html+='</div>';
  document.getElementById('panel-collection').innerHTML=html;
}

// ============================================================
// LEADERBOARD
// ============================================================
function renderLB(){
  LB[0].x=S.xp;
  var sorted=LB.slice().sort(function(a,b){return(b.x||0)-(a.x||0)});
  var html='<div style="font-size:.7rem;font-weight:800;color:var(--dim);margin-bottom:8px">CLASSEMENT HEBDO</div>';
  sorted.forEach(function(p,i){
    var ranks=['🥇','🥈','🥉'];
    var lvl=LEVELS[0];for(var j=LEVELS.length-1;j>=0;j--)if((p.x||0)>=LEVELS[j].xp){lvl=LEVELS[j];break}
    html+='<div class="lb-item'+(p.me?' me':'')+'">'+
      '<div class="lb-rank">'+(ranks[i]||(i+1))+'</div>'+
      '<div class="lb-avatar">'+p.a+'</div>'+
      '<div class="lb-info"><div class="lb-name">'+p.n+(p.me?' (toi)':'')+'</div>'+
      '<div class="lb-xp">'+(p.x||0).toLocaleString()+' XP</div></div>'+
      '<div class="lb-lvl">'+lvl.e+' '+lvl.n+'</div></div>';
  });
  html+='<button class="invite-btn" onclick="shareGame()">Invite tes amis a jouer</button>';
  html+='<div class="game-footer">&copy; 2026 Emmanuel Klein — SOS Planet<br>Aucune donnee personnelle collectee. 100% local.</div>';
  document.getElementById('panel-leaderboard').innerHTML=html;
}

window.shareGame=function(){
  var t='Rejoins SOS Planet ! Je suis niveau '+(getLvl()+1)+' ('+LEVELS[getLvl()].n+'). On sauve la planete en jouant !';
  if(navigator.share)navigator.share({title:'SOS Planet — Le Jeu',text:t,url:location.href});
  else{navigator.clipboard.writeText(t+' '+location.href);toast('📋','Lien copie !','Envoie-le a tes potes')}
};

// ============================================================
// LEVEL UP
// ============================================================
function showLvlUp(idx){
  snd('lvl');vibrate(200);confetti(60);
  var lv=LEVELS[idx];
  document.getElementById('lvlup-emoji').textContent=lv.e;
  document.getElementById('lvlup-title').textContent='NIVEAU '+lv.n.toUpperCase()+' !';
  document.getElementById('lvlup-sub').textContent='Ta planete evolue !';
  // Check creature unlock
  var newCreature=CREATURES.find(function(c){return c.l===(idx+1)});
  document.getElementById('lvlup-unlock').textContent=newCreature?'Nouvelle creature : '+newCreature.e+' '+newCreature.n+' !':'';
  document.getElementById('lvlup').classList.add('show');
}
window.closeLvlUp=function(){document.getElementById('lvlup').classList.remove('show')};

// ============================================================
// TABS
// ============================================================
var TABS=[
  {id:'quests',label:'Quetes',notif:true},
  {id:'boss',label:'Boss'},
  {id:'shop',label:'Boutique'},
  {id:'collection',label:'Bestiaire'},
  {id:'leaderboard',label:'Classement'}
];
var activeTab='quests';

function renderTabs(){
  var html='';
  TABS.forEach(function(t){
    var hasNotif=t.notif&&S.done.length<3;
    html+='<div class="gtab'+(activeTab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+
      t.label+(hasNotif?'<span class="notif"></span>':'')+'</div>';
  });
  document.getElementById('game-tabs').innerHTML=html;
}

window.switchTab=function(id){
  activeTab=id;renderTabs();
  TABS.forEach(function(t){document.getElementById('panel-'+t.id).classList.toggle('active',t.id===id)});
};

// ============================================================
// UPDATE UI
// ============================================================
function updateUI(){
  var lvl=getLvl(),lv=LEVELS[lvl];
  var next=LEVELS[lvl+1];
  var base=lv.xp,needed=next?(next.xp-base):1,current=S.xp-base;
  var pct=next?Math.min(100,Math.round(current/needed*100)):100;

  document.getElementById('level-badge').textContent='Niv. '+(lvl+1)+' '+lv.e+' '+lv.n;
  document.getElementById('xp-bar').style.width=pct+'%';
  document.getElementById('xp-text').textContent=current+' / '+needed+' XP';
  document.getElementById('coins-num').textContent=S.coins;
  document.getElementById('streak-num').textContent=S.streak;
  var si=document.getElementById('streak-icon');
  si.textContent=S.streak>0?'🔥':'💤';
  document.getElementById('streak').className='streak-badge'+(S.streak>0?'':' dead');
  document.getElementById('planet-label').textContent=lv.e+' '+lv.n+(lvl<10?' — prochain : '+LEVELS[lvl+1].e+' '+LEVELS[lvl+1].n:'  MAX !');
}

// ============================================================
// INIT
// ============================================================
checkStreak();
getQuests();
initPlanet();
renderTabs();
renderQuests();
renderBoss();
renderShop();
renderCollection();
renderLB();
renderGarden();
updateUI();
switchTab('quests');
drawPlanet();

// Show spin wheel if not spun today
setTimeout(function(){if(S.spinDay!==today())showWheel()},800);

})();
